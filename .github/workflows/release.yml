name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Validate data
        run: npm run lint:data

      - name: Build Windows web package
        run: npm run package:release

      - name: Build Android APK
        run: |
          chmod +x android/gradlew
          npm run cap:apk

      - name: Collect release assets
        run: |
          mkdir -p release/assets
          cp release/thermal-stat-skeleton-web.zip "release/assets/thermal-stat-skeleton-windows-web-${GITHUB_REF_NAME}.zip"
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/assets/thermal-stat-skeleton-android-debug-${GITHUB_REF_NAME}.apk"
          cd release/assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Thermal Stat Skeleton ${{ github.ref_name }}
          body: |
            Thermal Stat Skeleton first release.

            Assets:
            - Windows Web package: unzip and run `start-windows.cmd`.
            - Android debug APK: install manually for side-load testing.
            - SHA256SUMS.txt: checksums for release assets.
          files: release/assets/*
